<div class="min-h-screen bg-surface flex">
  <aside class="hidden md:flex flex-col fixed inset-y-0 left-0 w-60 bg-primary-dark z-30">
    <div class="flex items-center gap-3 px-4 py-5 bg-[#0a2444]">
      <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center flex-shrink-0">
        <span class="text-primary font-bold text-sm">SE</span>
      </div>
      <span class="text-white font-bold text-lg">SeniorEase</span>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      @for (item of sidebarItems; track item.path) {
        @if (!item.disabled) {
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-white/20 !text-white font-semibold"
            class="flex items-center gap-3 px-3 py-3 rounded-xl text-primary-light hover:bg-white/10 transition-colors text-[15px]"
          >
            <fa-icon [icon]="item.icon" class="w-7 text-center text-lg"></fa-icon>
            <span>{{ item.label }}</span>
          </a>
        } @else {
          <span
            class="flex items-center gap-3 px-3 py-3 rounded-xl text-primary-light/30 text-[15px] cursor-not-allowed select-none"
          >
            <fa-icon [icon]="item.icon" class="w-7 text-center text-lg"></fa-icon>
            <span>{{ item.label }}</span>
          </span>
        }
      }
    </nav>

    <div class="p-3 pb-6">
      <div class="flex items-center gap-3 bg-white/10 rounded-xl px-3 py-3">
        <div class="w-9 h-9 bg-accent rounded-full flex items-center justify-center flex-shrink-0">
          <span class="text-white font-bold text-xs">SA</span>
        </div>
        <span class="text-white text-sm font-medium truncate">Sr. Arnaldo</span>
      </div>
    </div>
  </aside>

  <main class="flex-1 md:pl-60 min-h-screen">
    <router-outlet />
  </main>

  <nav class="md:hidden fixed bottom-0 inset-x-0 bg-white border-t border-border z-30">
    <div class="flex items-stretch h-20">
      @for (item of bottomNavItems; track item.path) {
        @if (!item.disabled) {
          <a
            [routerLink]="item.path"
            routerLinkActive
            #rla="routerLinkActive"
            class="flex-1 flex flex-col items-center justify-center gap-1 transition-colors"
            [class.text-primary]="rla.isActive"
            [class.text-muted]="!rla.isActive"
          >
            <fa-icon [icon]="item.icon" class="text-2xl"></fa-icon>
            <span class="text-[11px]" [class.font-semibold]="rla.isActive">{{ item.label }}</span>
          </a>
        } @else {
          <span
            class="flex-1 flex flex-col items-center justify-center gap-1 text-muted/30 select-none"
          >
            <fa-icon [icon]="item.icon" class="text-2xl"></fa-icon>
            <span class="text-[11px]">{{ item.label }}</span>
          </span>
        }
      }
    </div>
  </nav>
</div>
