<div
  class="video-placeholder"
  [ngClass]="{ 'high-contrast': accessibility.theme() === 'high-contrast' }"
  appVoiceRead="Área de vídeo. Imagem do professor ao vivo."
>
  <div class="video-overlay">
    <span class="status-badge" appVoiceRead="Ao Vivo">● AO VIVO</span>

    <div class="connection-badge" appVoiceRead="Conexão estável">
      <span class="status-dot"></span>
      <span class="status-text">CONEXÃO OK</span>
    </div>

    <i class="camera-icon" aria-hidden="true">🎥</i>
  </div>

  <p class="placeholder-text">A imagem do professor aparecerá aqui</p>
</div>
