<div
  class="pb-10 min-h-screen transition-colors"
  [ngClass]="accessibility.theme() === 'high-contrast' ? 'bg-black' : 'bg-surface'"
>
  <header
    class="border-b bg-card sticky top-0 z-10 px-6 py-4 flex items-center gap-4"
    [ngClass]="accessibility.theme() === 'high-contrast' ? 'border-yellow-400' : 'border-border'"
  >
    <button (click)="router.navigate(['/inicio'])" class="p-2 text-primary text-xl">
      <fa-icon [icon]="icons.arrowLeft"></fa-icon>
    </button>
    <h1 class="text-xl font-bold text-foreground">Meu Caderno Digital</h1>
  </header>

  <div class="px-6 py-6 max-w-2xl">
    <div *ngIf="savedNotes.length > 0; else emptyState" class="space-y-6">
      <div
        *ngFor="let note of savedNotes"
        class="bg-card rounded-2xl p-6 shadow-md border-2 relative group"
        [ngClass]="
          accessibility.theme() === 'high-contrast' ? 'border-yellow-400' : 'border-primary/10'
        "
      >
        <div class="flex justify-between items-start mb-3">
          <div>
            <h2 class="text-lg font-bold text-primary">{{ note.title }}</h2>
            <p class="text-xs text-muted">{{ note.date | date: "d 'de' MMMM" : '' : 'pt-BR' }}</p>
          </div>

          <button
            class="w-12 h-12 rounded-full bg-primary/10 text-primary flex items-center justify-center active:scale-90 transition-transform"
            [appVoiceRead]="'Ouvir anotação: ' + note.content"
          >
            <fa-icon [icon]="icons.volume"></fa-icon>
          </button>
        </div>

        <div class="border-t pt-4 border-border/50">
          <p class="text-lg leading-relaxed text-foreground italic">"{{ note.content }}"</p>
        </div>

        <button
          (click)="deleteNote(note.id)"
          class="absolute bottom-4 right-4 text-muted hover:text-red-500 opacity-30 hover:opacity-100 p-2"
        >
          <fa-icon [icon]="icons.trash" class="text-sm"></fa-icon>
        </button>
      </div>
    </div>

    <ng-template #emptyState>
      <div class="text-center py-20">
        <div class="w-20 h-20 bg-muted/20 rounded-full flex items-center justify-center mb-4">
          <fa-icon [icon]="icons.book" class="text-3xl text-muted"></fa-icon>
        </div>
        <p class="text-xl font-bold text-muted">Seu caderno ainda está em branco.</p>
        <p class="text-sm text-muted mt-2">
          As anotações que você fizer nas aulas aparecerão aqui automaticamente.
        </p>
      </div>
    </ng-template>
  </div>
</div>
