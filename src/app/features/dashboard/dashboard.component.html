<div class="pb-[88px] md:pb-8">
  <div class="md:hidden bg-primary px-6 pt-10 pb-6">
    <h1 class="text-white text-2xl font-bold" appVoiceRead="Olá! Sr. Arnaldo">Olá! Sr. Arnaldo,</h1>
    <p class="text-primary-light text-sm mb-0.5 first-letter:uppercase">
      {{ today | date: "EEEE, d 'de' MMMM 'de' y" : '' : 'pt-BR' }}
    </p>
    <p class="text-primary-light text-sm mb-0.5 mt-3">O que temos para fazer hoje?</p>
  </div>

  <div class="hidden md:block border-b border-border bg-card px-8 py-5">
    <h1 class="text-xl font-bold text-foreground">Início</h1>
    <p class="text-sm text-muted mt-0.5" appVoiceRead="Olá, Sr. Arnaldo">Olá, Sr. Arnaldo</p>
  </div>

  <div class="px-6 md:px-8 pt-5 md:max-w-2xl">
    <div
      class="bg-card rounded-2xl shadow-md overflow-hidden mb-5 border border-border"
      appVoiceRead="Aula de hoje: Desenvolvimento Front End, das 19 horas às 21 horas. Sala virtual 03. Professor Doutor Carlos Mendes."
    >
      <div class="bg-primary px-5 py-3">
        <p class="text-xs font-bold uppercase tracking-wide text-white">Aula de hoje</p>
      </div>
      <div class="p-5">
        <div class="flex items-start justify-between gap-3">
          <div class="flex-1 min-w-0">
            <h2 class="text-xl font-bold leading-snug text-foreground">
              Desenvolvimento Front End
            </h2>
            <p class="text-sm text-muted mt-1">19:00 - 21:00 • Sala virtual 03</p>
            <p class="text-sm text-muted mt-1">Prof. Dr. Carlos Mendes</p>
          </div>
          <div
            class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0"
          >
            <span class="text-primary font-bold text-sm leading-none text-center">SE</span>
          </div>
        </div>
        <div class="mt-4">
          <button
            type="button"
            class="w-full bg-primary text-white font-bold py-3 px-6 rounded-xl shadow-sm hover:opacity-90 active:scale-95 transition-all flex items-center justify-between group"
            appVoiceRead="Botão Entrar na aula"
            (click)="router.navigate(['/sala-de-espera'])"
          >
            <span>Entrar na aula</span>
            <fa-icon
              [icon]="icons.chevronRight"
              class="group-hover:translate-x-1 transition-transform"
            ></fa-icon>
          </button>
        </div>
      </div>
    </div>

    <section class="mb-5">
      <h2
        class="text-sm font-semibold text-muted uppercase tracking-wide mb-3"
        appVoiceRead="Mais para hoje"
      >
        Mais para hoje
      </h2>
      <button
        type="button"
        class="w-full bg-card border border-primary/20 rounded-2xl p-4 mb-5 flex items-center justify-between text-left hover:bg-primary/5 transition-colors group"
        appVoiceRead="Fórum: Hackathon. 3 novas mensagens. Toque para acessar."
        (click)="router.navigate(['/forum'])"
      >
        <div class="flex items-center gap-4">
          <div
            class="w-8 h-8 rounded-full bg-primary-surface flex items-center justify-center flex-shrink-0"
          >
            <fa-icon [icon]="icons.clipboard" class="text-primary"></fa-icon>
          </div>
          <div>
            <p class="font-bold text-foreground text-base">Fórum: Hackathon</p>
            <p class="text-sm text-muted mt-1">3 novas mensagens</p>
          </div>
        </div>
        <fa-icon
          [icon]="icons.chevronRight"
          class="text-primary group-hover:translate-x-1 transition-transform"
        ></fa-icon>
      </button>

      <button
        type="button"
        class="w-full bg-card border border-primary/20 rounded-2xl p-4 mb-5 flex items-center justify-between text-left hover:bg-primary/5 transition-colors group"
        appVoiceRead="Entregar trabalho final. Prazo: hoje às 23:59. Concluído. 100 por cento. Toque para acessar."
        (click)="router.navigate(['/forum'])"
      >
        <div class="flex items-center gap-4">
          <div
            class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 transition-colors"
            [ngClass]="
              accessibility.theme() === 'high-contrast'
                ? 'bg-black border border-yellow-400'
                : 'bg-success-light'
            "
          >
            <span
              class="text-xs font-bold"
              [ngClass]="
                accessibility.theme() === 'high-contrast' ? 'text-yellow-400' : 'text-success'
              "
              >✓</span
            >
          </div>
          <div>
            <p class="font-bold text-foreground text-base">Entregar trabalho final</p>
            <p class="text-sm text-muted mt-1">Prazo: hoje às 23:59 · Concluído</p>
          </div>
        </div>
        <fa-icon
          [icon]="icons.chevronRight"
          class="text-primary group-hover:translate-x-1 transition-transform"
        ></fa-icon>
      </button>
    </section>
  </div>
</div>
